services:
  db:
    image: postgis/postgis:15-3.3
    container_name: aqi_db
    environment:
      POSTGRES_DB: aqi_gv
      POSTGRES_USER: aqi_user
      POSTGRES_PASSWORD: aqi_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aqi_user -d aqi_gv" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: aqi_backend
    environment:
      DATABASE_URL: postgresql://aqi_user:aqi_pass@db:5432/aqi_gv
      SECRET_KEY: supersecret_jwt_key_change_in_prod
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./docker/kmz:/app/kmz
    command: sh -c "sleep 10 && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: nginx:alpine
    container_name: aqi_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  pgdata:
